<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Help — OceanView Resort</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    /* ── Help page styles ─────────────────────────────── */
    .help-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0;
    }
    .help-tab-btn {
      background: none;
      border: none;
      padding: 10px 20px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color .15s, border-color .15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .help-tab-btn:hover { color: var(--text-primary); }
    .help-tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .help-tab-panel { display: none; }
    .help-tab-panel.active { display: block; }

    /* Guideline cards */
    .guideline-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    .guideline-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      transition: box-shadow .15s;
    }
    .guideline-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,.08); }
    .guideline-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .guideline-num {
      width: 32px; height: 32px;
      background: var(--accent);
      color: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700;
      flex-shrink: 0;
    }
    .guideline-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .guideline-steps {
      list-style: none;
      padding: 0; margin: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .guideline-steps li {
      font-size: 0.84rem;
      color: var(--text-secondary);
      padding: 6px 10px;
      background: var(--bg);
      border-radius: 6px;
      line-height: 1.4;
    }

    /* FAQ accordion */
    .faq-list { display: flex; flex-direction: column; gap: 10px; }
    .faq-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .faq-question {
      width: 100%;
      background: none;
      border: none;
      padding: 16px 20px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      transition: background .12s;
    }
    .faq-question:hover { background: var(--bg); }
    .faq-question.open { color: var(--accent); }
    .faq-chevron {
      flex-shrink: 0;
      transition: transform .2s;
      color: var(--text-muted);
    }
    .faq-question.open .faq-chevron { transform: rotate(180deg); }
    .faq-answer {
      display: none;
      padding: 0 20px 16px;
      font-size: 0.86rem;
      color: var(--text-secondary);
      line-height: 1.65;
      border-top: 1px solid var(--border);
    }
    .faq-answer.open { display: block; }

    /* System features grid */
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .feature-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      transition: box-shadow .15s;
    }
    .feature-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,.08); }
    .feature-icon {
      width: 40px; height: 40px;
      background: var(--accent-soft, rgba(99,102,241,.1));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 12px;
      font-size: 1.25rem;
    }
    .feature-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .feature-desc {
      font-size: 0.84rem;
      color: var(--text-secondary);
      line-height: 1.55;
    }

    .help-section-meta {
      font-size: 0.83rem;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .help-spinner { display: flex; justify-content: center; padding: 48px 0; }
  </style>
</head>
<body>
<div class="app-layout">

  <!-- ══════════════════════ SIDEBAR ══════════════════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon">🏨</div>
      <div>
        <div class="sidebar-brand-name">Ocean View</div>
        <div class="sidebar-brand-sub">Resort Management</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="dashboard.html" class="nav-link" id="nav-dashboard"><span class="nav-link-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></span><span>Dashboard</span></a>
      <a href="guests.html" class="nav-link" id="nav-guests"><span class="nav-link-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span><span>Guests</span></a>
      <a href="reservations.html" class="nav-link" id="nav-reservations"><span class="nav-link-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span><span>Reservations</span></a>
      <a href="billing.html" class="nav-link" id="nav-billing"><span class="nav-link-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></span><span>Billing</span></a>
      <a href="help.html" class="nav-link" id="nav-help"><span class="nav-link-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 4"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span><span>Help</span></a>
      <div class="nav-section-label manager-only">Administration</div>
      <a href="rooms.html" class="nav-link nav-link-admin manager-only" id="nav-rooms"><span class="nav-link-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span><span>Room Management</span><span class="nav-badge">Admin</span></a>
      <a href="users.html" class="nav-link nav-link-admin manager-only" id="nav-users"><span class="nav-link-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></span><span>User Management</span><span class="nav-badge">Admin</span></a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="userAvatar">U</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="userName">Loading...</div>
          <div class="sidebar-user-role" id="userRole"></div>
        </div>
      </div>
      <button class="sidebar-logout-btn" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sign Out
      </button>
    </div>
  </aside>

  <!-- ══════════════════════ MAIN CONTENT ══════════════════ -->
  <main class="main-content">

    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div>
          <h1 class="topbar-title">Help &amp; Guidelines</h1>
          <p class="topbar-sub">Staff guidelines, FAQs and system documentation</p>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-role-badge" id="roleBadge"></div>
      </div>
    </header>

    <div class="content-body">

      <!-- Tab bar -->
      <div class="help-tabs">
        <button class="help-tab-btn active" data-tab="guidelines">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" style="width:16px;height:16px"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Staff Guidelines
        </button>
        <button class="help-tab-btn" data-tab="faq">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" style="width:16px;height:16px"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 4"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Reservation FAQ
        </button>
        <button class="help-tab-btn" data-tab="system">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" style="width:16px;height:16px"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/></svg>
          System Help
        </button>
      </div>

      <!-- Tab: Staff Guidelines -->
      <div class="help-tab-panel active" id="tab-guidelines">
        <p class="help-section-meta" id="guidelinesMeta">Loading…</p>
        <div class="guideline-grid" id="guidelinesGrid">
          <div class="help-spinner"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Tab: Reservation FAQ -->
      <div class="help-tab-panel" id="tab-faq">
        <p class="help-section-meta" id="faqMeta">Loading…</p>
        <div class="faq-list" id="faqList">
          <div class="help-spinner"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Tab: System Help -->
      <div class="help-tab-panel" id="tab-system">
        <p class="help-section-meta" id="systemMeta">Loading…</p>
        <div class="feature-grid" id="systemGrid">
          <div class="help-spinner"><div class="spinner"></div></div>
        </div>
      </div>

    </div><!-- /content-body -->
  </main>

</div><!-- /app-layout -->

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="js/config.js"></script>
<script src="js/help.js"></script>
<script>
  const menuBtn = document.getElementById("menuToggle");
  const sidebar  = document.getElementById("sidebar");
  const overlay  = document.getElementById("sidebarOverlay");
  menuBtn.addEventListener("click", () => {
    sidebar.classList.toggle("open");
    overlay.classList.toggle("active");
  });
  overlay.addEventListener("click", () => {
    sidebar.classList.remove("open");
    overlay.classList.remove("active");
  });

  const roleBadgeEl = document.getElementById("roleBadge");
  const role = getRole();
  if (roleBadgeEl && role) {
    roleBadgeEl.textContent = role.charAt(0) + role.slice(1).toLowerCase();
    roleBadgeEl.className = "topbar-role-badge " + (role === "MANAGER" ? "badge-manager" : "badge-staff");
  }

  const user = getUser();
  const avatarEl = document.getElementById("userAvatar");
  if (avatarEl && user.name) avatarEl.textContent = user.name.charAt(0).toUpperCase();
</script>
</body>
</html>
